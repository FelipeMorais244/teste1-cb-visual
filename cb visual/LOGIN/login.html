<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-box">

<div class="user-icon">
<img src="image-removebg-preview.png" width="70">
</div>

<h1>User Login</h1>

<form>

<div class="input-box">
<input type="text" name="usuario" placeholder="User">
</div>

<div class="input-box">
<input type="password" name="senha" placeholder="Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button type="submit">LOGIN</button>

</form>

</div>

</body>
</html>
